# 対応 §: ロードマップ §7.3 §14.1 §14.2 §15.2
# 「docker compose up」を 1 コマンド／5 分以内に Web UI 到達の §14.2 目標を満たすため、
# PostgreSQL とバックエンドを最小構成で起動する。導入企業のオンプレ運用前提（§1）。

# Compose 仕様 v3 系（v3.9）を採用し、健康チェックと依存順序を表現する
version: "3.9"

# サービス定義
services:
  # PostgreSQL: §7.3 で採用された永続化基盤（§15.2 PITR の前提）
  postgres:
    # 安定版 16-alpine を使用（Alpine ベースで軽量・SCI 観点と整合、§11.7.2）
    image: postgres:16-alpine
    # コンテナ名を固定し、Runbook（§16）からの参照を容易にする
    container_name: wna-postgres
    # 環境変数で初期 DB／ユーザー／パスワードを設定する（本番では Secret 管理へ）
    environment:
      POSTGRES_DB: wna
      POSTGRES_USER: wna
      POSTGRES_PASSWORD: wna_dev_password
    # ポートをホストへ公開する（開発時のみ。本番は内部ネットワークに閉じる）
    ports:
      - "5432:5432"
    # データを名前付きボリュームに永続化する（§15.2 RPO の前提）
    volumes:
      - wna_postgres_data:/var/lib/postgresql/data
    # 健康チェックで起動完了を判定し、依存サービスの起動順を保証する
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wna"]
      interval: 5s
      timeout: 3s
      retries: 10

  # バックエンド: Rust／tokio／axum（§7.3）
  backend:
    # ローカルビルドのため Dockerfile への参照を持つ（services/backend/Dockerfile は将来作成）
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    # 起動コンテナ名を固定する
    container_name: wna-backend
    # PostgreSQL の起動完了を待ってから起動する
    depends_on:
      postgres:
        condition: service_healthy
    # 環境変数で接続先を設定する（環境変数は infrastructure/config.rs で読み取る）
    environment:
      DATABASE_URL: postgres://wna:wna_dev_password@postgres:5432/wna
      RUST_LOG: info
      WNA_LISTEN_ADDR: 0.0.0.0:8080
      # デモ／開発用の固定値（本番では Secret Manager から注入する。ADR-0010）
      WNA_SESSION_SECRET: demo-session-secret-please-replace-in-production-32bytes
    # REST API ポートをホストへ公開する（§5.2 性能目標を満たすか確認）
    ports:
      - "8080:8080"
    # 健康チェック: §14.2 自己診断と整合する /healthz エンドポイントを将来実装する
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

# 名前付きボリューム
volumes:
  # PostgreSQL データの永続ボリューム
  wna_postgres_data:
