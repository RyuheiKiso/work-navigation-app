components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 で署名された JWT を Bearer トークンとして送信する

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid, description: UUID v7 形式 }
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PerPage:
      name: per_page
      in: query
      schema: { type: integer, default: 50, minimum: 1, maximum: 200 }

  responses:
    Unauthorized:
      description: 認証失敗
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Forbidden:
      description: 認可失敗
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    NotFound:
      description: 未検出
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Conflict:
      description: 競合
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    ValidationError:
      description: バリデーション失敗
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Locked:
      description: アカウントロック
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }

  schemas:
    LocalizedText:
      type: object
      required: [ja, en, zh]
      properties:
        ja: { type: string }
        en: { type: string }
        zh: { type: string }

    ResponseMeta:
      type: object
      required: [request_id, server_time, api_version]
      properties:
        request_id: { type: string, format: uuid }
        server_time: { type: string, format: date-time }
        api_version: { type: string, enum: [v1] }

    PageMeta:
      type: object
      required: [total, page, per_page, total_pages]
      properties:
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        total_pages: { type: integer }

    ProblemDetails:
      type: object
      required: [type, title, status, detail]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }
        error_id: { type: string }
        violations:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
              value: {}

    Jwks:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object

    AuthLoginRequest:
      type: object
      required: [login_id, password, device_id, factory_id]
      properties:
        login_id: { type: string }
        password: { type: string }
        device_id: { type: string, format: uuid }
        factory_id: { type: string, format: uuid }

    AuthLoginResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in, refresh_expires_in, roles, user_id, factory_id]
      properties:
        access_token: { type: string }
        refresh_token: { type: string, format: uuid }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }
        refresh_expires_in: { type: integer }
        roles: { type: array, items: { type: string } }
        user_id: { type: string, format: uuid }
        factory_id: { type: string, format: uuid }

    AuthLoginResponseEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/AuthLoginResponse' }
        meta: { $ref: '#/components/schemas/ResponseMeta' }

    AuthRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, format: uuid }

    AuthRefreshResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        token_type: { type: string }
        expires_in: { type: integer }

    AuthRefreshResponseEnvelope:
      type: object
