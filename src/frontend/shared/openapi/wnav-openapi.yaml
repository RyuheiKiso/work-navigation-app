openapi: "3.1.0"
info:
  title: WNAV API
  version: 1.0.0
  description: |
    作業ナビゲーションシステム REST API。terminal-api（ポート 8080）と master-api（ポート 8081）の統合仕様。
    エラーは RFC 9457 Problem Details 形式で返却する。
  contact:
    name: WNAV Engineering
    email: engineering@wnav.example.com
servers:
  - url: http://localhost:8080/api/v1
    description: terminal-api ローカル開発
  - url: http://localhost:8081/api/v1
    description: master-api ローカル開発
  - url: https://wnav-terminal.factory.local/api/v1
    description: terminal-api 本番
  - url: https://wnav-master.factory.local/api/v1
    description: master-api 本番

security:
  - bearerAuth: []

tags:
  - name: auth
    description: 認証・認可（API-auth-001〜004）
  - name: work-executions
    description: 作業実行（API-work-execs-001〜005）
  - name: evidences
    description: エビデンス（API-evidences-001）
  - name: electronic-signs
    description: 電子サイン（API-electronic-signs-001〜003）
  - name: master
    description: マスタ管理（API-master-001〜007）
  - name: alerts
    description: アンドン（API-andon-001〜002）
  - name: capa
    description: CAPA（API-capa-001〜002）
  - name: kaizen
    description: 改善提案（API-kaizen-001）
  - name: nonconformities
    description: 非適合品（補足仕様）
  - name: work-assignments
    description: 作業指示割当（API-sync-003〜005）
  - name: iqc
    description: IQC（API-iqc-001〜005）
  - name: rework
    description: リワーク（API-reworks-001 等）
  - name: dispositions
    description: ディスポジション（API-dispositions-001）
  - name: ops
    description: 運用（API-ops-001〜002）
  - name: reports
    description: 帳票（API-reports-001〜002）
  - name: system
    description: ヘルスチェック（API-system-001〜003）
  - name: audit
    description: 監査ログ・トレース（API-trace-001〜002）

paths:
  /auth/login:
    post:
      tags: [auth]
      operationId: postAuthLogin
      summary: ログイン（API-auth-001）
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthLoginRequest' }
      responses:
        '200': { description: 認証成功, content: { application/json: { schema: { $ref: '#/components/schemas/AuthLoginResponseEnvelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '423': { $ref: '#/components/responses/Locked' }

  /auth/refresh:
    post:
      tags: [auth]
      operationId: postAuthRefresh
      summary: トークン更新（API-auth-002）
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthRefreshRequest' }
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { $ref: '#/components/schemas/AuthRefreshResponseEnvelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [auth]
      operationId: postAuthLogout
      summary: ログアウト（API-auth-003）
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '204': { description: ログアウト完了 }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/jwks:
    get:
      tags: [auth]
      operationId: getJwks
      summary: JWKS 公開鍵取得（API-auth-004 補足）
      security: []
      responses:
        '200': { description: JWKS, content: { application/json: { schema: { $ref: '#/components/schemas/Jwks' } } } }

  /auth/me:
    get:
      tags: [auth]
      operationId: getMe
      summary: 現在のログインユーザー情報取得
      responses:
        '200': { description: ユーザー情報, content: { application/json: { schema: { $ref: '#/components/schemas/UserEnvelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /work-executions:
    post:
      tags: [work-executions]
      operationId: postWorkExecution
      summary: 作業実行開始（API-work-execs-001）
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWorkExecutionRequest' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/WorkExecutionEnvelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /work-executions/{id}/heartbeat:
    put:
      tags: [work-executions]
      operationId: putWorkExecutionHeartbeat
      summary: 作業実行ハートビート
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { type: object } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /work-executions/{id}/suspend:
    post:
      tags: [work-executions]
      operationId: postWorkExecutionSuspend
      summary: 作業中断（API-work-execs-003）
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuspendWorkExecutionRequest' }
      responses:
        '200': { description: 中断成功, content: { application/json: { schema: { $ref: '#/components/schemas/SuspensionEnvelope' } } } }
        '409': { $ref: '#/components/responses/Conflict' }

  /work-executions/{id}/resume:
    post:
      tags: [work-executions]
      operationId: postWorkExecutionResume
      summary: 作業再開（API-work-execs-004）
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResumeWorkExecutionRequest' }
      responses:
        '200': { description: 再開成功, content: { application/json: { schema: { $ref: '#/components/schemas/WorkExecutionEnvelope' } } } }

  /work-executions/{id}/complete:
    post:
      tags: [work-executions]
      operationId: postWorkExecutionComplete
      summary: 作業完了（API-work-execs-005）
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteWorkExecutionRequest' }
      responses:
        '200': { description: 完了成功, content: { application/json: { schema: { $ref: '#/components/schemas/WorkExecutionEnvelope' } } } }
        '409': { $ref: '#/components/responses/Conflict' }

  /evidences:
    post:
      tags: [evidences]
      operationId: postEvidence
      summary: エビデンスアップロード（API-evidences-001）
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [metadata, file]
              properties:
                metadata: { type: string, description: JSON 文字列としてシリアライズされた EvidenceMetadata }
                file: { type: string, format: binary }
      responses:
        '201': { description: アップロード成功, content: { application/json: { schema: { $ref: '#/components/schemas/EvidenceEnvelope' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }

  /electronic-signs:
    post:
      tags: [electronic-signs]
      operationId: postElectronicSign
      summary: 電子サイン作成（API-electronic-signs-001）
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateElectronicSignRequest' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/ElectronicSignEnvelope' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
    get:
      tags: [electronic-signs]
      operationId: listElectronicSigns
      summary: 電子サイン一覧（API-electronic-signs-003）
      parameters:
        - { name: work_execution_id, in: query, schema: { type: string } }
        - { name: signer_id, in: query, schema: { type: string } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/ElectronicSignListEnvelope' } } } }

  /master/processes:
    get:
      tags: [master]
      operationId: listProcesses
      summary: 工程一覧
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - { name: is_active, in: query, schema: { type: boolean } }
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/ProcessListEnvelope' } } } }
    post:
      tags: [master]
      operationId: createProcess
      summary: 工程作成
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Process' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/ProcessEnvelope' } } } }

  /master/processes/{id}:
    get:
      tags: [master]
      operationId: getProcess
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200': { description: 取得, content: { application/json: { schema: { $ref: '#/components/schemas/ProcessEnvelope' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [master]
      operationId: updateProcess
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Process' }
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { $ref: '#/components/schemas/ProcessEnvelope' } } } }

  /master/operations:
    get:
      tags: [master]
      operationId: listOperations
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ]
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/OperationListEnvelope' } } } }
    post:
      tags: [master]
      operationId: createOperation
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Operation' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/OperationEnvelope' } } } }

  /master/operations/{id}:
    get:
      tags: [master]
      operationId: getOperation
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200': { description: 取得, content: { application/json: { schema: { $ref: '#/components/schemas/OperationEnvelope' } } } }
    patch:
      tags: [master]
      operationId: updateOperation
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Operation' }
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { $ref: '#/components/schemas/OperationEnvelope' } } } }

  /master/products:
    get:
      tags: [master]
      operationId: listProducts
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ]
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/ProductListEnvelope' } } } }
    post:
      tags: [master]
      operationId: createProduct
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Product' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/ProductEnvelope' } } } }

  /master/products/{id}:
    get:
      tags: [master]
      operationId: getProduct
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200': { description: 取得, content: { application/json: { schema: { $ref: '#/components/schemas/ProductEnvelope' } } } }
    patch:
      tags: [master]
      operationId: updateProduct
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Product' }
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { $ref: '#/components/schemas/ProductEnvelope' } } } }

  /master/sops:
    get:
      tags: [master]
      operationId: listSops
      parameters:
        - { name: process_id, in: query, schema: { type: string } }
        - { name: has_published_version, in: query, schema: { type: boolean } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/SopListEnvelope' } } } }
    post:
      tags: [master]
      operationId: createSop
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Sop' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/SopEnvelope' } } } }

  /master/sops/{id}:
    get:
      tags: [master]
      operationId: getSop
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: as_of
          in: query
          description: 時点参照（ISO 8601 UTC）。指定した時点で有効だった SOP を返す
          required: false
          schema: { type: string, format: date-time }
      responses:
        '200': { description: 取得, content: { application/json: { schema: { $ref: '#/components/schemas/SopEnvelope' } } } }
    patch:
      tags: [master]
      operationId: updateSop
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Sop' }
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { $ref: '#/components/schemas/SopEnvelope' } } } }

  /master/sops/{id}/steps:
    get:
      tags: [master]
      operationId: listSopSteps
      summary: SOP ステップ一覧（API-master-010）
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200': { description: ステップ一覧, content: { application/json: { schema: { type: object, properties: { data: { type: array, items: { $ref: '#/components/schemas/Step' } } } } } } }
    put:
      tags: [master]
      operationId: replaceSopSteps
      summary: SOP ステップ一括保存（API-master-011）
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { steps: { type: array, items: { $ref: '#/components/schemas/Step' } }, flowJson: { type: string } } }
      responses:
        '200': { description: 保存成功, content: { application/json: { schema: { type: object, properties: { data: { type: array, items: { $ref: '#/components/schemas/Step' } } } } } } }

  /master/sops/{id}/submit:
    post:
      tags: [master]
      operationId: submitSopForReview
      summary: SOP レビュー提出（API-master-004）
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SopWorkflowRequest' }
      responses:
        '200': { description: 提出成功, content: { application/json: { schema: { $ref: '#/components/schemas/MasterVersionEnvelope' } } } }

  /master/sops/{id}/approve:
    post:
      tags: [master]
      operationId: approveSop
      summary: SOP 承認（API-master-005）
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SopApprovalRequest' }
      responses:
        '200': { description: 承認成功, content: { application/json: { schema: { $ref: '#/components/schemas/MasterVersionEnvelope' } } } }

  /master/sops/{id}/publish:
    post:
      tags: [master]
      operationId: publishSop
      summary: SOP 発行
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '200': { description: 発行成功, content: { application/json: { schema: { $ref: '#/components/schemas/MasterVersionEnvelope' } } } }

  /master/sops/{id}/deprecate:
    post:
      tags: [master]
      operationId: deprecateSop
      summary: SOP 廃止
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '200': { description: 廃止成功, content: { application/json: { schema: { $ref: '#/components/schemas/MasterVersionEnvelope' } } } }

  /master/sops/{id}/versions:
    get:
      tags: [master]
      operationId: listSopVersions
      summary: SOP バージョン一覧（API-master-001）
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/MasterVersionListEnvelope' } } } }

  /master/users:
    get:
      tags: [master]
      operationId: listUsers
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ]
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/UserListEnvelope' } } } }
    post:
      tags: [master]
      operationId: createUser
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserRequest' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/UserEnvelope' } } } }

  /master/users/{id}:
    get:
      tags: [master]
      operationId: getUser
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200': { description: 取得, content: { application/json: { schema: { $ref: '#/components/schemas/UserEnvelope' } } } }
    patch:
      tags: [master]
      operationId: updateUser
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/User' }
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { $ref: '#/components/schemas/UserEnvelope' } } } }

  /master/roles:
    get:
      tags: [master]
      operationId: listRoles
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { type: object } } } }

  /master/skills:
    get:
      tags: [master]
      operationId: listSkills
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { type: object } } } }

  /master/materials:
    get:
      tags: [master]
      operationId: listMaterials
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ]
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/MaterialListEnvelope' } } } }
    post:
      tags: [master]
      operationId: createMaterial
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Material' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/MaterialEnvelope' } } } }

  /master/materials/{id}:
    patch:
      tags: [master]
      operationId: updateMaterial
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Material' }
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { $ref: '#/components/schemas/MaterialEnvelope' } } } }

  /master/suppliers:
    get:
      tags: [master]
      operationId: listSuppliers
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ]
      responses:
        '200': { description: 一覧, content: { application/json: { schema: { $ref: '#/components/schemas/SupplierListEnvelope' } } } }
    post:
      tags: [master]
      operationId: createSupplier
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Supplier' }
      responses:
        '201': { description: 作成成功, content: { application/json: { schema: { $ref: '#/components/schemas/SupplierEnvelope' } } } }

  /master/suppliers/{id}:
    patch:
      tags: [master]
      operationId: updateSupplier
      parameters: [ { $ref: '#/components/parameters/PathId' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Supplier' }
      responses:
        '200': { description: 更新成功, content: { application/json: { schema: { $ref: '#/components/schemas/SupplierEnvelope' } } } }

