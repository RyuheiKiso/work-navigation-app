# pg_hba.conf — PostgreSQL クライアント認証設定
# 権威ドキュメント:
#   docs/04_概要設計/01_システム方式設計/03_配置設計（Active_Standby・単一建屋内冗長）.md §3-2
#   ADR-012（PostgreSQL 16 採用）
#
# 認証方式: scram-sha-256 のみを使用する（MD5 は使用しない）
# 理由: scram-sha-256 は MD5 より安全なハッシュアルゴリズムを使用し、
#       リプレイ攻撃・パスワードスニッフィングに対して耐性がある

# TYPE  DATABASE        USER                    ADDRESS                 METHOD

# ローカルソケット接続: Docker コンテナ内のすべてのユーザーに scram-sha-256 を要求する
local   all             all                                             scram-sha-256

# IPv4 ローカルホスト接続（Docker bridge wnav_backend ネットワーク内の API コンテナから）
host    all             all             127.0.0.1/32                    scram-sha-256

# Docker bridge ネットワーク内（172.16.0.0/12 の範囲: Docker デフォルト割り当て）
# terminal-api と master-api コンテナからの接続を許可する
host    all             all             172.16.0.0/12                   scram-sha-256

# Standby レプリケーション用（NODE-002 から wnav_replication ユーザーでの接続）
# 同一建屋内 Gigabit Ethernet 接続のため 127.0.0.1/32 + 172.16.0.0/12 を許可する
host    replication     wnav_replication    127.0.0.1/32               scram-sha-256
host    replication     wnav_replication    172.16.0.0/12              scram-sha-256
