# postgresql.conf — WNAV 本番設定
# 権威ドキュメント:
#   docs/04_概要設計/01_システム方式設計/03_配置設計（Active_Standby・単一建屋内冗長）.md
#   docs/04_概要設計/08_運用方式設計/04_バックアップ・リストア方式.md
#   ADR-012（PostgreSQL 16 採用）
#   ADR-017（PG 拡張機能確定）

# ============================================================
# 接続設定
# ============================================================

# 最大接続数（端末 API + 管理 API + バックアップ用の合計を考慮した値）
max_connections = 200

# ============================================================
# メモリ設定
# コンテナ環境向けの注記: 実際のホスト RAM の 25% を推奨
# NODE-001 (16GB RAM 想定) の場合: 4GB = 16GB * 25%
# ============================================================

# 共有バッファ（ホスト RAM の 25% が推奨値）
shared_buffers = 4GB

# ソート・ハッシュ結合用の作業メモリ（接続ごとに確保されるため max_connections と積算に注意）
work_mem = 256MB

# VACUUM / CREATE INDEX 等のメンテナンス操作用メモリ
maintenance_work_mem = 1GB

# ============================================================
# WAL 設定（レプリケーション・PITR 対応）
# docs/04_概要設計/08_運用方式設計/04_バックアップ・リストア方式.md §3 準拠
# ============================================================

# スタンバイへのストリーミングレプリケーションを有効にするため replica に設定する
wal_level = replica

# WAL アーカイブを有効にする（PITR に必要）
archive_mode = on

# WAL アーカイブコマンド（%p: WAL ファイルパス, %f: WAL ファイル名）
# cp 後に gzip で圧縮してアーカイブサイズを削減する
# 権威: docs/04_概要設計/08_運用方式設計/04_バックアップ・リストア方式.md §3.1
archive_command = 'cp %p /wal_archive/%f && gzip -f /wal_archive/%f'

# RPO 補助: 5 分以内に強制アーカイブしてポイントインタイムリカバリの粒度を確保する
archive_timeout = 300

# スタンバイへ転送するために保持する WAL サイズ（最低限のバッファ）
wal_keep_size = 1GB

# チェックポイント間隔（デフォルト 5min を 10min に延長してランダム I/O を削減する）
checkpoint_timeout = 10min

# チェックポイント完了目標（チェックポイント期間の 90% 以内に書き込みを分散させる）
checkpoint_completion_target = 0.9

# ============================================================
# ログ設定
# ============================================================

# スロークエリ: 1 秒超のクエリをログに記録する（パフォーマンス監視用）
log_min_duration_statement = 1000

# ログ行プレフィックス（タイムスタンプ・ユーザー・データベース・接続元 IP を記録する）
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# チェックポイント実行をログに記録する（I/O 負荷の把握用）
log_checkpoints = on

# 接続・切断をログに記録する（セキュリティ監査用）
log_connections = on
log_disconnections = on

# ログのタイムゾーン（日本標準時）
log_timezone = 'Asia/Tokyo'

# ============================================================
# ロケール・文字列設定
# ============================================================

# 日付スタイル（ISO 形式を優先する）
datestyle = 'iso, mdy'

# タイムゾーン（日本標準時）
timezone = 'Asia/Tokyo'

# ロケール設定（Alpine / musl libc 対応）
# postgres:16-alpine は musl libc のため glibc 日本語ロケール（ja_JP.UTF-8）が利用不可。
# データベース自体の日本語コレーションは ICU ロケールプロバイダ（00_create_databases.sh）で実現する。
# lc_messages は en_US.UTF-8（Alpine で確実にサポートされる）を明示指定する。
lc_messages = 'en_US.UTF-8'

# デフォルトの全文検索設定（日本語テキストは別途辞書設定が必要だが ver1.0.0 では simple を使用する）
default_text_search_config = 'pg_catalog.simple'

# ============================================================
# 拡張機能設定（ADR-017 準拠）
# pg_stat_statements は shared_preload_libraries での事前ロードが必要
# ============================================================

# 起動時にロードするライブラリ（pg_stat_statements はここで指定しなければ使用できない）
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements: 記録する最大クエリ数
pg_stat_statements.max = 10000

# pg_stat_statements: 追跡対象（all: すべてのクエリを追跡する）
pg_stat_statements.track = all
