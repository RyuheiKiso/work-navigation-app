# postgresql.standby.conf — Standby ノード向け追加設定
# 権威ドキュメント:
#   docs/04_概要設計/01_システム方式設計/03_配置設計（Active_Standby・単一建屋内冗長）.md §4
#   docs/09_運用・保守/運用手順/10_ActiveStandby切替手順（OPS-PROC-010）.md
#
# 使用方法:
#   Standby ノードの postgresql.conf の末尾に以下を追記する:
#   include = '/etc/postgresql/postgresql.standby.conf'
#
# 注意:
#   このファイルは Active ノードには適用しない。
#   Standby ノードのみがこのファイルを postgresql.conf から INCLUDE する。

# ============================================================
# Standby 専用設定
# ============================================================

# ホットスタンバイを有効にする（Standby に接続して読み取りクエリを実行可能にする）
hot_standby = on

# フィードバック有効化（Standby で実行中のクエリに必要な行を Active が削除しないよう通知する）
# vacuum による行削除で Standby のクエリがキャンセルされるリスクを軽減する
hot_standby_feedback = on

# Standby でのストリーミングレプリケーション遅延の最大許容時間
# この時間を超えた場合、Standby は競合クエリをキャンセルして WAL 適用を優先する
max_standby_streaming_delay = 30s

# ============================================================
# レプリケーション接続設定
# 実際の値は Docker コンテナ環境変数（.env.standby）で設定する
# ここには接続文字列を直書きしない（ADR-012 セキュリティ方針準拠）
# ============================================================

# プライマリへの接続文字列（環境変数で上書きする）
# primary_conninfo = 'host=wnav-primary port=5432 user=wnav_replication password=CHANGE_ME application_name=wnav-standby'

# WAL アーカイブからのリストアコマンド（PITR 用）
# フェイルオーバー時に recovery.conf.template からコピーして有効化する
# restore_command = 'cp /var/lib/postgresql/wal_archive/%f %p'

# ============================================================
# 注記: フェイルオーバー時の操作手順
# OPS-PROC-010 §4.3 参照
# 1. touch /var/lib/postgresql/data/standby.signal を削除する
# 2. recovery.conf.template を postgresql.conf に INCLUDE する
# 3. pg_ctl promote を実行してプライマリに昇格させる
# ============================================================
