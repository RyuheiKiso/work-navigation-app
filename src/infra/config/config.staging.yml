# ============================================================
# WNAV 設定ファイル — staging プロファイル
#
# 【重要】このファイルは Git にコミットされる。
#         機密情報は一切記載せず、secret_ref で参照すること。
#         本番同構成での検証を目的とする（ssl_mode: require 等）。
#
# 起動前に以下の環境変数または Docker secrets を設定すること:
#   WNAV_DB_PASSWORD_WRITE / _EVENT_INSERT / _READ
#   WNAV_BE_JWT_SECRET / WNAV_BE_JWT_PUBLIC_KEY
#   WNAV_BE_WEBHOOK_SECRET
#   WNAV_BE_BACKUP_NOTIFICATION_URL
#   WNAV_INFRA_TLS_CERT / WNAV_INFRA_TLS_KEY
# ============================================================

schema_version: 1
profile: staging

server:
  master_api:
    bind_addr: "127.0.0.1"              # 管理 LAN のみ受付

database:
  host: "wnav-staging.example.local"    # staging DB ホスト
  name: "wnav_staging"
  ssl_mode: "require"
  max_connections: 50

cors:
  allow_origins:
    - "https://wnav-staging.example.local"

observability:
  log_level: "info"

frontend:
  handy:
    default_api_base_url: "https://wnav-staging.example.local"
  master:
    api_base_url: "https://wnav-staging.example.local"
    openapi_url: "https://wnav-staging.example.local/api/openapi.json"

infra:
  backup:
    dir: "/var/lib/postgresql/backups"
  network:
    allowed_ips:
      - "192.168.10.0/24"
