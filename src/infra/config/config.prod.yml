# ============================================================
# WNAV 設定ファイル — prod プロファイル
#
# 【重要】このファイルは Git にコミットされる。
#         機密情報は一切記載せず、secret_ref で参照すること。
#         prod (Windows Server 2022) では dpapi: スキームを使用する。
#         Docker コンテナ内では docker_secret: スキームが選択肢。
#
# 本番起動前の確認事項:
#   - secret_ref: dpapi:WNAV_DB_PASSWORD_WRITE_ENC 等が DPAPI で暗号化済み
#   - WNAV_PROFILE=prod が環境変数に設定済み
#   - WNAV_CONFIG_DIR が /etc/wnav/config/ を指しているか確認
# ============================================================

schema_version: 1
profile: prod

server:
  master_api:
    bind_addr: "127.0.0.1"              # 管理 LAN のみ受付

database:
  host: "wnav-server.factory.local"     # 本番 DB ホスト（実 FQDN に変更）
  name: "wnav_prod"
  ssl_mode: "require"
  max_connections: 100
  min_connections: 5
  # prod では DPAPI で暗号化した値を参照する
  write:
    user: "wnav_write"
    password:
      secret_ref: "dpapi:WNAV_DB_PASSWORD_WRITE_ENC"
  event_insert:
    user: "wnav_event_insert"
    password:
      secret_ref: "dpapi:WNAV_DB_PASSWORD_EVENT_INSERT_ENC"
  read:
    user: "wnav_read"
    password:
      secret_ref: "dpapi:WNAV_DB_PASSWORD_READ_ENC"

jwt:
  private_key:
    secret_ref: "dpapi:WNAV_BE_JWT_SECRET_ENC"
  public_key:
    secret_ref: "dpapi:WNAV_BE_JWT_PUBLIC_KEY_ENC"

cors:
  allow_origins:
    - "https://wnav.factory.local"       # 本番サイト URL（実 FQDN に変更）

observability:
  log_level: "warn"

webhook:
  hmac_key:
    secret_ref: "dpapi:WNAV_BE_WEBHOOK_SECRET_ENC"

external:
  backup_notification_url:
    secret_ref: "dpapi:WNAV_BE_BACKUP_NOTIFICATION_URL_ENC"

frontend:
  handy:
    default_api_base_url: "https://wnav.factory.local"
  master:
    api_base_url: "https://wnav.factory.local"
    openapi_url: "https://wnav.factory.local/api/openapi.json"

infra:
  nginx:
    tls_cert_path:
      secret_ref: "file:/etc/wnav/tls/server.crt"
    tls_key_path:
      secret_ref: "file:/etc/wnav/tls/server.key"
  backup:
    dir: "/var/lib/postgresql/backups"
  network:
    allowed_ips:
      - "192.168.10.0/24"               # 工場 LAN セグメント（実 IP に変更）
      - "192.168.20.0/24"               # 管理 LAN セグメント（実 IP に変更）
