# 日本語翻訳ファイル（MOD-SH-001 LocaleResolver）
# エラーメッセージの多言語化のために使用する。
# キー形式: {feature}.{component}.{key}

[error.auth]
# 認証が必要な場合のエラーメッセージ
unauthorized = "認証が必要です"
# JWT が有効期限切れの場合のエラーメッセージ
jwt_expired = "セッションが有効期限切れです。再ログインしてください"
# ロールが不足している場合のエラーメッセージ
insufficient_role = "この操作を実行する権限がありません"

[error.biz]
# 前の手順が完了していない場合のエラーメッセージ
lock_step_violation = "前の手順が完了していません。手順を順番に実施してください"
# 証拠記録が必要な場合のエラーメッセージ
evidence_required = "この手順には証拠記録が必要です"
# 電子サインが必要な場合のエラーメッセージ
sign_required = "この手順には電子サインが必要です"
# ケースがロックされている場合のエラーメッセージ
case_locked = "この作業セッションは別の端末で作業中のため操作できません"
# ステップが見つからない場合のエラーメッセージ
step_not_found = "指定された手順が見つかりません"
# SOP が公開されていない場合のエラーメッセージ
sop_not_published = "この標準作業手順書はまだ公開されていません"
# スキルレベルが不足している場合のエラーメッセージ
skill_level_insufficient = "この作業を実施するスキルレベルが不足しています"
