# やさしい日本語翻訳ファイル（MOD-SH-001 LocaleResolver / FR-UI-002）
# JLPT N4 相当のやさしい日本語でエラーメッセージを表現する。
# キー形式: {feature}.{component}.{key}

[error.auth]
# 認証が必要な場合のエラーメッセージ（やさしい日本語）
unauthorized = "ログインが必要です"
# JWT が有効期限切れの場合のエラーメッセージ（やさしい日本語）
jwt_expired = "ログインの時間が終わりました。もう一度ログインしてください"
# ロールが不足している場合のエラーメッセージ（やさしい日本語）
insufficient_role = "この作業はできません"

[error.biz]
# 前の手順が完了していない場合のエラーメッセージ（やさしい日本語）
lock_step_violation = "前の手順がまだ終わっていません。順番に作業してください"
# 証拠記録が必要な場合のエラーメッセージ（やさしい日本語）
evidence_required = "この手順では記録が必要です"
# 電子サインが必要な場合のエラーメッセージ（やさしい日本語）
sign_required = "この手順ではサインが必要です"
# ケースがロックされている場合のエラーメッセージ（やさしい日本語）
case_locked = "この作業は今ほかの端末で使われています"
# ステップが見つからない場合のエラーメッセージ（やさしい日本語）
step_not_found = "この手順が見つかりません"
# SOP が公開されていない場合のエラーメッセージ（やさしい日本語）
sop_not_published = "この作業手順書はまだ使えません"
# スキルレベルが不足している場合のエラーメッセージ（やさしい日本語）
skill_level_insufficient = "この作業をするための資格が足りません"
