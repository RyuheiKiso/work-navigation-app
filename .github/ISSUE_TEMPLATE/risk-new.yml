name: 新規リスク
description: §29.3 リスク登録簿への新規リスク追加申請
labels: ["risk-new"]
body:
  - type: markdown
    attributes:
      value: |
        ロードマップ §29 リスク登録簿への新規追加。
        評価軸（発生確率・影響度・優先度・対応戦略）を必ず埋めてください。

  - type: input
    id: title
    attributes:
      label: リスクタイトル
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 区分
      options:
        - 個人開発
        - 競合
        - 規制
        - 技術
        - サプライチェーン
        - コミュニティ
        - LLM
        - 法務
        - 運用
        - UX
        - データ
        - 資金
        - その他
    validations:
      required: true

  - type: dropdown
    id: probability
    attributes:
      label: 発生確率（1=稀 〜 5=ほぼ確実）
      options: ["1", "2", "3", "4", "5"]
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: 影響度（1=軽微 〜 5=致命的）
      options: ["1", "2", "3", "4", "5"]
    validations:
      required: true

  - type: dropdown
    id: response
    attributes:
      label: 対応戦略
      options:
        - 回避
        - 軽減
        - 転嫁
        - 受容
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: 評価根拠
      description: 一次資料・統計・先行事例の URL を含めて記載

  - type: textarea
    id: mitigation
    attributes:
      label: 緩和策
      description: |
        - 関連する FMEA 行（§27 F-XXX）
        - 関連する SLI／SLO（§31）
        - 関連 ADR
