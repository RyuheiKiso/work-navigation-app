name: 競合スコア反論
description: §4.6.3 採点反論プロセスに従い、競合比較表（§4）の評価に異議を申し立てる
labels: ["competitive-score"]
body:
  - type: markdown
    attributes:
      value: |
        ロードマップ §4.6.3 反論プロセスに従い、メンテナが 2 週間以内に再採点・是非判定します。

  - type: input
    id: target
    attributes:
      label: 対象セル
      description: 製品名 × 軸 ID（A1〜A11）。例 Tulip × A4
    validations:
      required: true

  - type: dropdown
    id: current_score
    attributes:
      label: 現行スコア
      options: ["◎", "○", "△", "×", "?"]
    validations:
      required: true

  - type: dropdown
    id: proposed_score
    attributes:
      label: 提案スコア
      options: ["◎", "○", "△", "×", "?"]
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 一次資料・出典
      description: |
        §4.6.2 セル採点規則に従い、◎ は一次資料 2 件以上、○ は 1 件以上が必要。URL を記載。
    validations:
      required: true

  - type: textarea
    id: bias_check
    attributes:
      label: バイアス対策（§4.6.4）
      description: |
        自軸 ◎ の独占性回避（自軸 ◎ で他社並列 ◎ が 1 件以上存在）を維持しているか確認。
