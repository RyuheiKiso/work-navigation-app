name: アンチゴール抵触の確認
description: §26 アンチゴール集に抵触する要望の取り扱いを明示する
labels: ["anti-goal"]
body:
  - type: markdown
    attributes:
      value: |
        本テンプレートは §26 アンチゴール集に該当する可能性のある要望を扱う際に使用します。
        該当が確定した場合は §26.2 取り下げ規約に従い、本 Issue を一次クローズし §17 アドオン化を提案します。

  - type: input
    id: original_request
    attributes:
      label: 元となる要望／Issue／PR
      description: URL またはタイトル
    validations:
      required: true

  - type: dropdown
    id: anti_goal_match
    attributes:
      label: 抵触するアンチゴール（§26.1）
      multiple: true
      options:
        - SaaS 提供
        - iOS／iPadOS 対象化
        - MES／ERP 置き換え
        - 設備保全等の別ドメイン取り込み
        - ダーク・パターン採用
        - SSO／Passkey／顔認証の本体内蔵
        - OPC UA／MQTT／Modbus／PLC の本体直結
        - Python 採用
        - 越境データ移転
        - PII 過剰収集
        - 外部ビジュアル回帰 SaaS／プロプラ計測 SaaS 採用
        - GPL／非寛容ライセンス採用
        - 沈黙の妥協
        - 人間ヒアリング・社外秘情報・NDA 配下情報の引用
        - 機械翻訳のみで本番投入
        - アドオンの glob／ワイルドカード越境
        - 1 ファイル 500 行超え／逆向き依存
        - π計算／CSP の形式化採用
        - 性能未達のままリリース
        - 規制適合の未分類リリース
        - アスキー図ドキュメント
        - フェーズ・MVP 設定
    validations:
      required: true

  - type: textarea
    id: addon_path
    attributes:
      label: §17 アドオン化での代替提案
      description: 本要望をアドオンとして実現する場合の概略
