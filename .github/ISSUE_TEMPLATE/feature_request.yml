name: 機能要望
description: 新機能・機能改善の提案
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## 機能要望

        ロードマップの **アンチゴール集（§26）** に該当しないことを事前にご確認ください。
        該当する場合は `anti-goal` ラベルで一次クローズし、§17 アドオン化を検討します。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題（§26 妥協禁止）
      description: 「なぜ」必要かをロードマップ／メモ（§24）と照合して説明してください。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 具体的な機能・UI・API の概要。
    validations:
      required: true

  - type: dropdown
    id: scope_check
    attributes:
      label: スコープ判定
      description: §3.1.4 「作業ではないものの境界」、§26 アンチゴール集に該当しないか
      options:
        - スコープ内
        - 不確実
        - スコープ外（§26 該当）
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案（§30 Type 1 該当時は必須 ≥ 2）
      description: |
        Type 1 決定（不可逆）に該当する場合、代替案を 2 件以上記載してください。

  - type: dropdown
    id: addon_or_core
    attributes:
      label: 本体／アドオンのどちらが適切か
      options:
        - 本体機能
        - アドオン化候補（§17）
        - 設定 UI テンプレート（§10.2 テンプレ）
        - 観測ダッシュボード指標（§16）
        - 不確実
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 受入観点（§13）
      description: 受入観点を 3 件以上具体的に記載。

  - type: textarea
    id: impact
    attributes:
      label: 影響評価
      description: |
        - 競合比較表（§4）への影響
        - FMEA（§27）への影響
        - リスク登録簿（§29）への影響
        - SLO／SLI（§31）への影響
        - 既存 Type 1 決定（§30）との整合
