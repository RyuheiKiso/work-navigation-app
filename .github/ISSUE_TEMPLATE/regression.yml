name: リグレッション／競合追い越し
description: §22.4 是正フロー対象。性能・機能・競合上の劣化を検出した場合に起票
labels: ["regression"]
body:
  - type: markdown
    attributes:
      value: |
        ロードマップ §22.2 即時トリガーの一例（性能未達検出／競合に追い越される）。
        §22.4 是正フローで検出 → 影響評価 → 修正計画 → 検証 → 完了報告 を辿ります。

  - type: dropdown
    id: kind
    attributes:
      label: 種類
      options:
        - 性能リグレッション（§5.2）
        - 機能リグレッション
        - 競合追い越し（§4 △ 検出、`competitive-gap` ラベル併用）
        - SLO 逸脱（§31）
        - FMEA AP=H 顕在化（§27）
    validations:
      required: true

  - type: input
    id: detected_at
    attributes:
      label: 検出日
      description: YYYY-MM-DD
    validations:
      required: true

  - type: textarea
    id: detection_method
    attributes:
      label: 検出方法
      description: CI ジョブ名／カオス演習番号（S-01〜S-08、§13.4.2）／実機検証手順 等

  - type: textarea
    id: impact
    attributes:
      label: 影響評価
      description: |
        - 性能なら §5、競合なら §4、規制なら §12、SLO なら §31 への注記
        - §27 FMEA／§29 リスク登録簿への影響
        - 関連 SLI／SLO ID

  - type: textarea
    id: remediation_plan
    attributes:
      label: 修正計画（§22.4）
      description: |
        - ロードマップ更新箇所
        - CHANGELOG 反映の有無
        - 関連 PR
