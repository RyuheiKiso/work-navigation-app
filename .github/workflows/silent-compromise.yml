# 対応 §: ロードマップ §2.2 §22.4
# 沈黙の妥協（§2.2）検出を機械的に行う。
# PR 本文の 3 項チェック（出所／受入観点／§24.2）に未記入があれば
# `silent-compromise` ラベルを自動付与し、CI を fail させる。
name: silent-compromise

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, work]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  detect:
    name: PR テンプレ未記入検出
    runs-on: ubuntu-latest
    steps:
      - name: PR 本文を取得
        id: pr_body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            --jq .body > pr_body.txt || true
          echo "size=$(wc -c < pr_body.txt)" >> "$GITHUB_OUTPUT"

      - name: 沈黙の妥協 3 項判定
        id: judge
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          # §2.2 PR テンプレート必須 3 項目: 出所／受入観点／§24.2 追記済
          # チェックボックス未記入（ "[ ]" がそのまま残っているか）を検出する素朴判定
          if grep -qE '\[ \] 決定に \*\*出所\*\* がある' pr_body.txt; then
            missing=$((missing+1))
            echo "missing_origin=true" >> "$GITHUB_OUTPUT"
          fi
          if grep -qE '\[ \] 該当機能・該当文書に \*\*受入観点\*\* が記載されている' pr_body.txt; then
            missing=$((missing+1))
            echo "missing_acceptance=true" >> "$GITHUB_OUTPUT"
          fi
          if grep -qE '\[ \] §24\.2 出所表に新規独自決定が \*\*追記済\*\*' pr_body.txt; then
            missing=$((missing+1))
            echo "missing_traceability=true" >> "$GITHUB_OUTPUT"
          fi
          echo "missing_count=$missing" >> "$GITHUB_OUTPUT"

      - name: ラベル付与
        if: steps.judge.outputs.missing_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.pull_request.number }} \
            --add-label "silent-compromise"

      - name: ラベル除去（条件回復時）
        if: steps.judge.outputs.missing_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.pull_request.number }} \
            --remove-label "silent-compromise" || true

      - name: コメント投稿
        if: steps.judge.outputs.missing_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "ロードマップ §2.2 沈黙の妥協チェックにより、PR テンプレの必須 3 項のいずれかに未記入があります。〔出所／受入観点／§24.2 追記〕の該当ボックスを更新してください。"

      - name: CI fail（§2.2 必須 3 項未記入時）
        if: steps.judge.outputs.missing_count != '0'
        run: |
          echo "::error::§2.2 必須 3 項のいずれかが未記入です（出所／受入観点／§24.2）"
          exit 1
