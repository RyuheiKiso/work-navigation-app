80" width="280" height="200" fill="#dae8fc" stroke="#6c8ebf" pointer-events="all" style="fill: light-dark(rgb(218, 232, 252), rgb(29, 41, 59)); stroke: light-dark(rgb(108, 142, 191), rgb(92, 121, 163));"/></g></g><g data-cell-id="sop_title"><g transform="translate(0.5,0.5)"><rect x="960" y="86" width="280" height="24" fill="none" stroke="none" pointer-events="all"/></g><g><g fill="#333333" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="12px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="1100" y="104">sop（SOP 3 階層）</text></g></g></g><g data-cell-id="sop_attrs"><g transform="translate(0.5,0.5)"><rect x="965" y="115" width="270" height="160" fill="none" stroke="none" pointer-events="all"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="967" y="131">id: UUID [PK]</text><text x="967" y="143">（工程 → 作業 → Step）</text><text x="967" y="155">effective_date: DATE</text><text x="967" y="167">version: INTEGER</text><text x="967" y="179">... 既存エンティティ</text></g></g></g><g data-cell-id="arrow_item_ekb"><g transform="translate(0.5,0.5)"><path d="M 210 160 L 270 220" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="stroke" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 215.66 160 L 210 165.66" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 272.83 217.17 L 264.34 214.34 L 267.17 222.83" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/></g></g><g data-cell-id="lbl_n_item"><g transform="translate(0.5,0.5)"><rect x="215" y="142" width="50" height="20" fill="none" stroke="none" pointer-events="all"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="240" y="158">N</text></g></g></g><g data-cell-id="arrow_extkey_ekb"><g transform="translate(0.5,0.5)"><path d="M 210 355 L 270 318" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="stroke" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 211.31 349.5 L 215.5 356.31" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 267.9 314.6 L 263.19 322.2 L 272.1 321.4" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/></g></g><g data-cell-id="arrow_ekb_wp"><g transform="translate(0.5,0.5)"><path d="M 550 220 L 620 180" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="stroke" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 551.98 223.47 L 556.95 216.03 L 548.02 216.53" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 618.51 185.46 L 614.54 178.51" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/></g></g><g data-cell-id="lbl_n1_ekb_wp"><g transform="translate(0.5,0.5)"><rect x="555" y="205" width="60" height="20" fill="none" stroke="none" pointer-events="all"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="585" y="221">N:1</text></g></g></g><g data-cell-id="arrow_wp_sop"><g transform="translate(0.5,0.5)"><path d="M 880 180 L 960 180" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="stroke" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 880 184 L 888 180 L 880 176" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 956 184 L 956 176" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/></g></g><g data-cell-id="lbl_n1_wp_sop"><g transform="translate(0.5,0.5)"><rect x="885" y="163" width="70" height="20" fill="none" stroke="none" pointer-events="all"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="920" y="179">N:1</text></g></g></g><g data-cell-id="alcoa_note"><g transform="translate(0.5,0.5)"><rect x="270" y="400" width="600" height="80" rx="12" ry="12" fill="#f5f5f5" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(245, 245, 245), rgb(26, 26, 26)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="280" y="444">ALCOA+ 整合: created_by（Attributable）/ created_at（Contemporaneous）/ Append-only 更新（valid_to を設定して新レコードを追加）</text></g></g></g><g data-cell-id="valid_note"><g transform="translate(0.5,0.5)"><rect x="270" y="510" width="600" height="60" fill="none" stroke="none" pointer-events="all"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="272" y="526">1 つの外部一意キーに対して、valid_from / valid_to + Effective Date の組み合わせで有効な作業パターンを一意決定する。</text><text x="272" y="538">1:N のバージョン違い SOP を保持できる。</text></g></g></g></g></g></g></svg>