193, 193));"><text x="1020" y="358">CSV エクスポート</text><text x="1020" y="371">（第二段階）</text></g></g></g><g data-cell-id="arrow_to_csv"><g transform="translate(0.5,0.5)"><path d="M 780 295 L 894.12 342.55" fill="none" stroke="#333333" stroke-miterlimit="10" pointer-events="stroke" style="stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/><path d="M 898.97 344.57 L 891.16 345.11 L 894.12 342.55 L 893.85 338.65 Z" fill="#333333" stroke="#333333" stroke-miterlimit="10" pointer-events="all" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193)); stroke: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"/></g></g><g data-cell-id="neg_dev"><g transform="translate(0.5,0.5)"><rect x="50" y="450" width="300" height="80" fill="#f5f5f5" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(245, 245, 245), rgb(26, 26, 26)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#666666" font-family="Helvetica" font-style="italic" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"><text x="200" y="488">開発者 ≠ データオーナー</text><text x="200" y="501">Bus Factor=1でも移行不可にしない</text></g></g></g><g data-cell-id="neg_parent"><g transform="translate(0.5,0.5)"><rect x="400" y="450" width="300" height="80" fill="#f5f5f5" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(245, 245, 245), rgb(26, 26, 26)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#666666" font-family="Helvetica" font-style="italic" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"><text x="550" y="488">親機（基幹システム）≠ データオーナー</text><text x="550" y="501">実績送信後も PostgreSQL が正典を保持</text></g></g></g><g data-cell-id="neg_lock"><g transform="translate(0.5,0.5)"><rect x="750" y="450" width="300" height="80" fill="#f5f5f5" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(245, 245, 245), rgb(26, 26, 26)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#666666" font-family="Helvetica" font-style="italic" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"><text x="900" y="488">データロックイン禁止</text><text x="900" y="501">いつでも全データを移行できる</text></g></g></g><g data-cell-id="schema_note"><g transform="translate(0.5,0.5)"><rect x="50" y="580" width="1100" height="60" rx="9" ry="9" fill="#dae8fc" stroke="#6c8ebf" pointer-events="all" style="fill: light-dark(rgb(218, 232, 252), rgb(29, 41, 59)); stroke: light-dark(rgb(108, 142, 191), rgb(92, 121, 163));"/></g><g><g fill="#333333" font-family="Helvetica" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="60" y="614.5">PostgreSQL スキーマ（DDL）は永続的にバージョン管理・公開する。廃止後もスキーマのみで PostgreSQL 直接参照が可能な設計を保証する。（構想 13 章）</text></g></g></g></g></g></g></svg>