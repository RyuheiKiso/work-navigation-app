<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light dark;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1201px" height="821px" viewBox="0 0 1201 821"><defs/><g><g data-cell-id="0"><g data-cell-id="1"><g data-cell-id="bg"><g transform="translate(0.5,0.5)"><rect x="0" y="0" width="1200" height="820" fill="#ffffff" stroke="none" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18));"/></g></g><g data-cell-id="title"><g transform="translate(0.5,0.5)"><rect x="150" y="16" width="900" height="36" fill="none" stroke="none" pointer-events="all"/></g><g><g fill="#333333" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="16px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="600" y="38">国内規制への立ち位置マトリクス</text></g></g></g><g data-cell-id="hdr_regulation"><g transform="translate(0.5,0.5)"><rect x="20" y="70" width="370" height="40" fill="#f5f5f5" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(245, 245, 245), rgb(26, 26, 26)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="12px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="205" y="95">規制・基準</text></g></g></g><g data-cell-id="hdr_stance"><g transform="translate(0.5,0.5)"><rect x="400" y="70" width="180" height="40" fill="#f5f5f5" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(245, 245, 245), rgb(26, 26, 26)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="12px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="490" y="95">立場</text></g></g></g><g data-cell-id="hdr_note"><g transform="translate(0.5,0.5)"><rect x="590" y="70" width="590" height="40" fill="#f5f5f5" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(245, 245, 245), rgb(26, 26, 26)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="12px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="885" y="95">備考</text></g></g></g><g data-cell-id="row1_reg"><g transform="translate(0.5,0.5)"><rect x="20" y="120" width="370" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="205" y="158">改正電子帳簿保存法</text><text x="205" y="171">（2024年完全義務化）</text></g></g></g><g data-cell-id="row1_stance"><g transform="translate(0.5,0.5)"><rect x="400" y="120" width="180" height="80" fill="#fff2cc" stroke="#d79b00" pointer-events="all" style="fill: light-dark(rgb(255, 242, 204), rgb(40, 29, 0)); stroke: light-dark(rgb(215, 155, 0), rgb(153, 101, 0));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="490" y="164.5">設計余地あり</text></g></g></g><g data-cell-id="row1_note"><g transform="translate(0.5,0.5)"><rect x="590" y="120" width="590" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="598" y="158">業務記録への直接適用なし。ALCOA+ 設計が電帳法の</text><text x="598" y="170">真実性確保・視認性確保と方向性が整合する。</text></g></g></g><g data-cell-id="row2_reg"><g transform="translate(0.5,0.5)"><rect x="20" y="210" width="370" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="205" y="248">ISO 9001:2015</text><text x="205" y="261">/ IATF 16949 / AS 9100</text></g></g></g><g data-cell-id="row2_stance"><g transform="translate(0.5,0.5)"><rect x="400" y="210" width="180" height="80" fill="#d5e8d4" stroke="#6c8ebf" pointer-events="all" style="fill: light-dark(rgb(213, 232, 212), rgb(31, 47, 30)); stroke: light-dark(rgb(108, 142, 191), rgb(92, 121, 163));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="490" y="254.5">設計思想が整合</text></g></g></g><g data-cell-id="row2_note"><g transform="translate(0.5,0.5)"><rect x="590" y="210" width="590" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="598" y="248">ISO 9001 の 8.1〜8.7（運用管理・不適合管理）と整合。</text><text x="598" y="260">第三者認証・適合保証は担わない。</text></g></g></g><g data-cell-id="row3_reg"><g transform="translate(0.5,0.5)"><rect x="20" y="300" width="370" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="205" y="338">ISO 13485</text><text x="205" y="351">（医療機器）</text></g></g></g><g data-cell-id="row3_stance"><g transform="translate(0.5,0.5)"><rect x="400" y="300" width="180" height="80" fill="#f8cecc" stroke="#b85450" pointer-events="all" style="fill: light-dark(rgb(248, 206, 204), rgb(81, 45, 43)); stroke: light-dark(rgb(184, 84, 80), rgb(215, 129, 126));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="490" y="344.5">永続非提供</text></g></g></g><g data-cell-id="row3_note"><g transform="translate(0.5,0.5)"><rect x="590" y="300" width="590" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="598" y="338">医療機器固有の設計管理（DHF）・検証プロセス（IEC 62304）が</text><text x="598" y="350">必要。個人開発スコープを根本的に超える。</text></g></g></g><g data-cell-id="row4_reg"><g transform="translate(0.5,0.5)"><rect x="20" y="390" width="370" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="205" y="428">労働安全衛生規則</text><text x="205" y="441">/ 労働基準法</text></g></g></g><g data-cell-id="row4_stance"><g transform="translate(0.5,0.5)"><rect x="400" y="390" width="180" height="80" fill="#d5e8d4" stroke="#6c8ebf" pointer-events="all" style="fill: light-dark(rgb(213, 232, 212), rgb(31, 47, 30)); stroke: light-dark(rgb(108, 142, 191), rgb(92, 121, 163));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="490" y="434.5">設計思想が整合</text></g></g></g><g data-cell-id="row4_note"><g transform="translate(0.5,0.5)"><rect x="590" y="390" width="590" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="598" y="428">夜勤・疲労・高齢者設計（Glanceable UI / EWI）が規則の精神と</text><text x="598" y="440">整合する。法的管理の代替はしない。</text></g></g></g><g data-cell-id="row5_reg"><g transform="translate(0.5,0.5)"><rect x="20" y="480" width="370" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="205" y="518">HACCP</text><text x="205" y="531">（食品安全・2021年義務化）</text></g></g></g><g data-cell-id="row5_stance"><g transform="translate(0.5,0.5)"><rect x="400" y="480" width="180" height="80" fill="#f8cecc" stroke="#b85450" pointer-events="all" style="fill: light-dark(rgb(248, 206, 204), rgb(81, 45, 43)); stroke: light-dark(rgb(184, 84, 80), rgb(215, 129, 126));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="490" y="518">永続非提供</text><text x="490" y="531">（流用は自己責任）</text></g></g></g><g data-cell-id="row5_note"><g transform="translate(0.5,0.5)"><rect x="590" y="480" width="590" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="598" y="518">CCP・Critical Limit 設計に食品安全専門知識が必要。</text><text x="598" y="530">自己責任での流用は対象外として関与しない。</text></g></g></g><g data-cell-id="row6_reg"><g transform="translate(0.5,0.5)"><rect x="20" y="570" width="370" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="205" y="614.5">GMP / FDA 21 CFR Part 11</text></g></g></g><g data-cell-id="row6_stance"><g transform="translate(0.5,0.5)"><rect x="400" y="570" width="180" height="80" fill="#f8cecc" stroke="#b85450" pointer-events="all" style="fill: light-dark(rgb(248, 206, 204), rgb(81, 45, 43)); stroke: light-dark(rgb(184, 84, 80), rgb(215, 129, 126));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="490" y="614.5">永続非提供</text></g></g></g><g data-cell-id="row6_note"><g transform="translate(0.5,0.5)"><rect x="590" y="570" width="590" height="80" fill="#ffffff" stroke="#666666" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(102, 102, 102), rgb(149, 149, 149));"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="598" y="608">電子署名技術規格・Validation（CSV）・GAMP 5 対応が</text><text x="598" y="620">必要。個人開発スコープを根本的に超える。</text></g></g></g><g data-cell-id="legend_green"><g transform="translate(0.5,0.5)"><rect x="20" y="680" width="180" height="60" fill="#d5e8d4" stroke="#6c8ebf" pointer-events="all" style="fill: light-dark(rgb(213, 232, 212), rgb(31, 47, 30)); stroke: light-dark(rgb(108, 142, 191), rgb(92, 121, 163));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="110" y="714">設計思想が整合</text></g></g></g><g data-cell-id="legend_yellow"><g transform="translate(0.5,0.5)"><rect x="210" y="680" width="180" height="60" fill="#fff2cc" stroke="#d79b00" pointer-events="all" style="fill: light-dark(rgb(255, 242, 204), rgb(40, 29, 0)); stroke: light-dark(rgb(215, 155, 0), rgb(153, 101, 0));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="300" y="714">設計余地あり（ver1.0.0では非保証）</text></g></g></g><g data-cell-id="legend_red"><g transform="translate(0.5,0.5)"><rect x="400" y="680" width="180" height="60" fill="#f8cecc" stroke="#b85450" pointer-events="all" style="fill: light-dark(rgb(248, 206, 204), rgb(81, 45, 43)); stroke: light-dark(rgb(184, 84, 80), rgb(215, 129, 126));"/></g><g><g fill="#333333" font-family="Helvetica" text-anchor="middle" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="490" y="714">永続非提供</text></g></g></g><g data-cell-id="legend_label"><g transform="translate(0.5,0.5)"><rect x="20" y="752" width="1160" height="24" fill="none" stroke="none" pointer-events="all"/></g><g><g fill="#333333" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(51, 51, 51), rgb(193, 193, 193));"><text x="22" y="768">凡例: 緑 = 設計思想として整合・推奨 / 黄 = 設計余地あり（ver1.0.0 では保証せず） / 赤 = 将来にわたって永続非提供</text></g></g></g></g></g></g></svg>