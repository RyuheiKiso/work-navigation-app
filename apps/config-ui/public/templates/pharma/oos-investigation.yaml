# 対応 §: ロードマップ §10.2.1 §10.3.2 §11.4.1
# OOS（Out of Specification）調査フロー。試験結果が規格外となった場合の調査経路。

flow:
  id: pharma-oos-investigation-v1
  name: 医薬品 OOS 調査
  industry: pharma
  schema_version: 1
  category: exception
  audit_trail_required: true
  e_signature_required: true
  trigger:
    type: anomaly_detected
    source: in_process_control_failure
  nodes:
    - id: start
      kind: start
      label: OOS 検出
    - id: phase1_lab_investigation
      kind: step
      label: Phase I（試験室調査）
      completion_criteria: manual
      standard_time_seconds: 7200
      e_signature: required
    - id: result_decision
      kind: decision
      label: 試験室起因か？
    - id: phase2_full_investigation
      kind: step
      label: Phase II（製造工程含む詳細調査）
      completion_criteria: manual
      standard_time_seconds: 14400
      e_signature: required
    - id: lab_error_correction
      kind: step
      label: 試験室誤差訂正
      completion_criteria: manual
      standard_time_seconds: 1800
      e_signature: required
    - id: capa
      kind: step
      label: CAPA（是正・予防措置）
      completion_criteria: manual
      standard_time_seconds: 3600
      e_signature: required
    - id: end
      kind: end
      label: 調査完了
  edges:
    - from: start
      to: phase1_lab_investigation
    - from: phase1_lab_investigation
      to: result_decision
    - from: result_decision
      to: lab_error_correction
      condition: lab_origin == true
    - from: result_decision
      to: phase2_full_investigation
      condition: lab_origin == false
    - from: phase2_full_investigation
      to: capa
    - from: lab_error_correction
      to: end
    - from: capa
      to: end
