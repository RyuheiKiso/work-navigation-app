# 対応 §: ロードマップ §10.2.1 §6.3 §10.5.0
# クリーンルーム入退室手順。手袋・マスク・ESD 帯のチェックを含む。

flow:
  id: electronics-cleanroom-entry-v1
  name: 電子部品 クリーンルーム入退室
  industry: electronics
  schema_version: 1
  category: governance
  nodes:
    - id: start
      kind: start
      label: 入室開始
    - id: face_recognition
      kind: step
      label: 顔認証（マスク対応アドオン）
      completion_criteria: manual
      standard_time_seconds: 5
      capabilities_required:
        - 'auth.extend:face'
    - id: clothing_change
      kind: step
      label: クリーンスーツ着用
      completion_criteria: photo
      standard_time_seconds: 180
    - id: esd_band_check
      kind: step
      label: ESD 防止帯装着確認
      completion_criteria: photo
      standard_time_seconds: 30
      ccp_thresholds:
        # 一般的な ESD 帯の許容抵抗値
        min_resistance_ohms: 750000
        max_resistance_ohms: 35000000
    - id: end
      kind: end
      label: 入室完了
  edges:
    - from: start
      to: face_recognition
    - from: face_recognition
      to: clothing_change
    - from: clothing_change
      to: esd_band_check
    - from: esd_band_check
      to: end
