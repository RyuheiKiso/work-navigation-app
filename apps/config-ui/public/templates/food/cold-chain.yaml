# 対応 §: ロードマップ §10.2.1 §12 HACCP §17 アドオン
# 冷蔵保管の温度連続監視フロー。OPC UA／MQTT で温度センサーと連携。

flow:
  id: food-cold-chain-v1
  name: 食品 冷蔵保管 温度監視
  industry: food
  schema_version: 1
  category: monitoring
  audit_trail_required: true
  # 30 分ごとに温度記録するスケジュール
  schedule:
    interval_seconds: 1800
  nodes:
    - id: start
      kind: start
      label: 監視開始
    - id: record_temp
      kind: step
      label: 温度記録
      # OPC UA／MQTT アドオンで自動取得した温度値を実績として書き込む
      completion_criteria: manual
      standard_time_seconds: 30
      critical_control_point: true
      ccp_thresholds:
        max_storage_temperature_c: 5
    - id: anomaly_decision
      kind: decision
      label: 規格外判定
    - id: alert
      kind: step
      label: 規格外通知（アンドン）
      completion_criteria: manual
      standard_time_seconds: 60
    - id: end
      kind: end
      label: 監視サイクル終了
  edges:
    - from: start
      to: record_temp
    - from: record_temp
      to: anomaly_decision
    - from: anomaly_decision
      to: alert
      condition: temperature > 5
    - from: anomaly_decision
      to: end
      condition: temperature <= 5
    - from: alert
      to: end
