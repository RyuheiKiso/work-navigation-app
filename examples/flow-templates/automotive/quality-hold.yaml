# 対応 §: ロードマップ §10.3.2 §11.4.1 §27 AT-003
# 品質ホールド検出時の例外フロー。基幹システムへの通知（§10.3.2）と監査ログ追記（§11.4.1）を含む。

flow:
  id: auto-quality-hold-v1
  name: 自動車部品 品質ホールド対応
  industry: automotive
  schema_version: 1
  category: exception
  # 起動契機
  trigger:
    type: anomaly_detected
    source: torque_check_completion_failure
  # ノード
  nodes:
    - id: start
      kind: start
      label: ホールド検出
    - id: stop_line
      kind: step
      label: ライン停止指示
      # アンドン通知（§9.3.1）
      completion_criteria: manual
      standard_time_seconds: 10
      andon_severity: 4
    - id: capture_evidence
      kind: step
      label: 不適合証跡（写真／動画）
      completion_criteria: photo
      standard_time_seconds: 60
    - id: notify_quality
      kind: step
      label: 品質保証へ通知（§10.3.2）
      completion_criteria: manual
      standard_time_seconds: 30
      mes_integration:
        action: notify_quality_hold
        endpoint: /quality-holds
    - id: corrective_action
      kind: step
      label: 是正措置記録
      completion_criteria: manual
      standard_time_seconds: 300
      audit_required: true
    - id: resume_decision
      kind: decision
      label: 再開判断
    - id: resume
      kind: step
      label: ライン再開
      completion_criteria: manual
      standard_time_seconds: 30
    - id: hold_continue
      kind: step
      label: ホールド継続
      completion_criteria: manual
      standard_time_seconds: 0
    - id: end
      kind: end
      label: 終了
  # 辺
  edges:
    - from: start
      to: stop_line
    - from: stop_line
      to: capture_evidence
    - from: capture_evidence
      to: notify_quality
    - from: notify_quality
      to: corrective_action
    - from: corrective_action
      to: resume_decision
    - from: resume_decision
      to: resume
      condition: ok_to_resume == true
    - from: resume_decision
      to: hold_continue
      condition: ok_to_resume == false
    - from: resume
      to: end
    - from: hold_continue
      to: end
  # FMEA 連携
  fmea_links:
    - node: notify_quality
      fmea_ids: [AT-003]
