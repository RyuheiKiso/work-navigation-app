# 対応 §: ロードマップ §10.2.1 §3.1.5.4 §12 IATF 16949 §8.5.1
# 自動車部品 組立ライン基本フロー（4 工程）。
# 設定 UI（§7.2）から本ファイルをインポートして利用する。

flow:
  id: auto-assembly-v1
  name: 自動車部品 組立ライン基本フロー
  industry: automotive
  schema_version: 1
  # IATF 16949 §8.5.1 タクトに刻まれた標準作業
  takt_time_seconds: 180
  # ノード（4 工程）
  nodes:
    - id: start
      kind: start
      label: 着手
    - id: receive_parts
      kind: step
      label: 部材受領
      # 完了条件: 写真証跡（§3.1.1）
      completion_criteria: photo
      # 標準時間（§9.3.1）
      standard_time_seconds: 30
      # ストレス予測（§9.2.1 5 軸）
      stress:
        cognitive_load: 2
        time_pressure: 1
        uncertainty: 1
        autonomy_loss: 1
        failure_cost: 4
    - id: assemble
      kind: step
      label: 組立
      completion_criteria: manual
      standard_time_seconds: 90
      stress:
        cognitive_load: 4
        time_pressure: 3
        uncertainty: 2
        autonomy_loss: 2
        failure_cost: 5
    - id: torque_check
      kind: step
      label: 締結トルク検査
      # トルクは OPC UA アドオン（examples/opc-ua-bridge）で実測連携可能
      completion_criteria: photo
      standard_time_seconds: 30
      stress:
        cognitive_load: 3
        time_pressure: 2
        uncertainty: 1
        autonomy_loss: 1
        failure_cost: 5
    - id: end
      kind: end
      label: 完了
  # 辺（順序情報）
  edges:
    - from: start
      to: receive_parts
    - from: receive_parts
      to: assemble
    - from: assemble
      to: torque_check
    - from: torque_check
      to: end
  # FMEA 連携（§27 §27.5）
  fmea_links:
    - node: receive_parts
      fmea_ids: [AT-001]
    - node: torque_check
      fmea_ids: [AT-002]
    - node: end
      fmea_ids: [AT-003]
