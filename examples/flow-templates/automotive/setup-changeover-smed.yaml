# 対応 §: ロードマップ §9.3.1 SMED §3.1.5.4 §10.2.1
# 段取り替え（SMED）。新郷重夫『シングル段取替えの極意』に従い、
# 内段取（設備停止中のみ可）と外段取（設備稼働中に可）を区別する。

flow:
  id: auto-changeover-smed-v1
  name: 自動車部品 段取り替え（SMED）
  industry: automotive
  schema_version: 1
  # 段取り替えは別フロー扱い（§9.3.1）
  category: changeover
  # ノード
  nodes:
    - id: start
      kind: start
      label: 段取り替え開始
    # 外段取（設備稼働中に並行可能）
    - id: prep_external
      kind: step
      label: 外段取（部材・治具準備）
      completion_criteria: manual
      standard_time_seconds: 300
      smed:
        type: external
    # 内段取（設備停止中のみ）
    - id: stop_equipment
      kind: step
      label: 設備停止
      completion_criteria: manual
      standard_time_seconds: 30
    - id: change_die
      kind: step
      label: 内段取（金型交換）
      completion_criteria: photo
      standard_time_seconds: 480
      smed:
        type: internal
    - id: trial_run
      kind: step
      label: 試打ち
      completion_criteria: photo
      standard_time_seconds: 120
    - id: resume
      kind: step
      label: 設備再起動
      completion_criteria: manual
      standard_time_seconds: 30
    - id: end
      kind: end
      label: 段取り替え完了
  # 辺
  edges:
    - from: start
      to: prep_external
    - from: prep_external
      to: stop_equipment
    - from: stop_equipment
      to: change_die
    - from: change_die
      to: trial_run
    - from: trial_run
      to: resume
    - from: resume
      to: end
