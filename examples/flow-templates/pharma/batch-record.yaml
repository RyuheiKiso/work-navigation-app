# 対応 §: ロードマップ §10.2.1 §12 §11.4.1
# バッチ製造記録（ISA-88 batch model 整合）。
# 各ステップは電子署名と監査証跡を必須とする（GxP 要件）。

flow:
  id: pharma-batch-record-v1
  name: 医薬品 バッチ製造記録
  industry: pharma
  schema_version: 1
  # GMP Annex 11 §6 監査証跡を必須化
  audit_trail_required: true
  # 21 CFR Part 11 §11.50 電子署名（採用は導入企業設定）
  e_signature_required: true
  nodes:
    - id: start
      kind: start
      label: バッチ着手
    - id: weighing
      kind: step
      label: 計量（原料）
      completion_criteria: photo
      standard_time_seconds: 300
      e_signature: required
      audit_required: true
    - id: granulation
      kind: step
      label: 造粒
      completion_criteria: manual
      standard_time_seconds: 1800
      e_signature: required
    - id: tableting
      kind: step
      label: 打錠
      completion_criteria: manual
      standard_time_seconds: 3600
      e_signature: required
    - id: in_process_control
      kind: step
      label: 工程内検査（IPC）
      completion_criteria: photo
      standard_time_seconds: 600
      e_signature: required
      # CCP 相当（HACCP の食品 CCP と類似）
      critical_control_point: true
    - id: packaging
      kind: step
      label: 包装
      completion_criteria: photo
      standard_time_seconds: 1200
      e_signature: required
    - id: end
      kind: end
      label: バッチ完了
  edges:
    - from: start
      to: weighing
    - from: weighing
      to: granulation
    - from: granulation
      to: tableting
    - from: tableting
      to: in_process_control
    - from: in_process_control
      to: packaging
    - from: packaging
      to: end
